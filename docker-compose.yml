services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://vulnscanner:vulnscanner@postgres:5432/vulnscanner
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      API_TOKEN: ${API_TOKEN:-}
      ALLOW_LOCAL_SCANS: ${ALLOW_LOCAL_SCANS:-}
      SCAN_PATH_ROOT: ${SCAN_PATH_ROOT:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      FROM_EMAIL_NAME: ${FROM_EMAIL_NAME:-}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgresql+psycopg2://vulnscanner:vulnscanner@postgres:5432/vulnscanner
      REDIS_URL: redis://redis:6379/0
      PROMPT_DIR: /app/prompts
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-fable-5}
      ANTHROPIC_FALLBACK_MODEL: ${ANTHROPIC_FALLBACK_MODEL:-claude-opus-4-8}
      ALLOW_LOCAL_SCANS: ${ALLOW_LOCAL_SCANS:-}
      SCAN_PATH_ROOT: ${SCAN_PATH_ROOT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vulnscanner
      POSTGRES_PASSWORD: vulnscanner
      POSTGRES_DB: vulnscanner
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnscanner -d vulnscanner"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
